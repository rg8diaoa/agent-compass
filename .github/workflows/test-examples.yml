name: Test Examples

on:
  push:
    paths:
      - 'examples/todo-api/**'
  pull_request:
    paths:
      - 'examples/todo-api/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r examples/todo-api/requirements.txt
      - name: Run tests
        run: pytest examples/todo-api/tests/ -v
