evolution:
- id: ADR-001
  topic: 为什么用 MIT 许可证
  decision: MIT（最大化传播，零使用门槛）
  date: 2026-06-06
- id: ADR-002
  topic: 为什么方法论用 00-14 编号而非 L{Level}_{CAT}{NN}
  decision: methodology/ 是教学材料，序号保持线性阅读顺序；项目文档才用 L 格式
  date: 2026-06-06
- id: ADR-003
  topic: 为什么 AGENTS.md 和 SKILL.md 并存
  decision: AGENTS.md 覆盖所有 Agent 工具；SKILL.md 给支持 Skill 机制的工具提供一键安装
  date: 2026-06-06
- id: ADR-004
  topic: 为什么模板不全部预设为 📝
  decision: ⏳ 待撰写是模板的正确状态——表示"待用户填入"。只有通用性极高的模板设为 📝
  date: 2026-06-06
- id: ADR-005
  topic: 为什么 MCP Server 需要 PYTHONIOENCODING=utf-8
  decision: Windows GBK 终端下 Python stderr 输出中文导致 MCP 握手消息损坏→Server 注册失败。mcp.json 加
    env.PYTHONIOENCODING=utf-8 + env.PYTHONUTF8=1
  date: 2026-06-07
- id: ADR-006
  topic: 为什么 mcp-tools.md 配置示例从 TOML 改为 mcp.json
  decision: 原文档用了不存在的 TOML 格式，实际 CodeWhale 读取 ~/.deepseek/mcp.json
  date: 2026-06-07
- id: ADR-007
  topic: 为什么 MCP Resources 暂不实现
  decision: Tools 是所有 Agent 工具的最大公约数（全支持），Resources 仅 Claude/CodeWhale 明确支持
  date: 2026-06-07
- id: ADR-008
  topic: 为什么从 agent-compass 改名为 AgentPrecept
  decision: 避免与 Future AGI 商业产品混淆。precept（戒律）比 compass（指南针）更精确覆盖"设计先行+强制拦截"
  date: 2026-06-08
- id: ADR-009
  topic: 为什么 init 从文档复制器升级为能力接入器
  decision: 当前 init 只复制文件，用户需手动配 Git/MCP/Hook/CI。改为 6 阶段一键接入
  date: 2026-06-08
- id: ADR-010
  topic: 为什么强制拦截分三层
  decision: AgentPrecept 无法拦截 Agent 工具的 write_file。三层在 MCP tool（软）、git commit（硬可跳过）、CI
    PR merge（硬不可跳过）
  date: 2026-06-08
- id: ADR-011
  topic: 为什么 checklist 项必须对齐 commit 粒度
  decision: '粗粒度 checklist 导致 commit 过大不可独立 revert。标准: 1-3 commit/item，架构边界=任务边界'
  date: 2026-06-08
- id: ADR-012
  topic: 为什么术语/内容/体验进自动化审计
  decision: basic-audit 从 8→15 维时原 14 维框架中术语/内容/体验被遗忘。维度 13/14/15 进自动化，维度 16-19 进自选清单
  date: 2026-06-08
